name: Release

on:
  push:
    tags:
      # Only immutable semver tags create releases. Floating aliases like
      # `v1` (which we move forward as the action's stable major-version
      # pointer) must NOT trigger this workflow — the v1 release already
      # exists from the v1.0.0 cut, so re-creating it 422s.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      # github.ref_name is the git tag (e.g. v1.0.0) — controlled input, not user-supplied
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
